api_platform:
    title: Hello API Platform
    version: 1.0.0
    mapping:
        paths:
            - '%kernel.project_dir%/src/Blog/Entity'
            - '%kernel.project_dir%/src/Cart/Entity'
            - '%kernel.project_dir%/src/Catalog/Entity'
            - '%kernel.project_dir%/src/Contact/Entity'
            - '%kernel.project_dir%/src/Marketing/Entity'
            - '%kernel.project_dir%/src/Media/Entity'
            - '%kernel.project_dir%/src/Order/Entity'
            - '%kernel.project_dir%/src/Payment/Entity'
            - '%kernel.project_dir%/src/Shipping/Entity'
            - '%kernel.project_dir%/src/Shared/Entity'
            - '%kernel.project_dir%/src/User/Entity'
    defaults:
        stateless: true
        cache_headers:
            vary: ['Content-Type', 'Authorization', 'Origin']

        pagination_enabled: true

        # Le client (ton front React) peut gérer la pagination
        pagination_client_enabled: true
        pagination_client_items_per_page: true
        pagination_client_partial: true

        # Valeur par défaut si aucun paramètre n'est passé
        pagination_items_per_page: 12

        # Limite maximale pour éviter d’exploser la requête
        pagination_maximum_items_per_page: 50
    eager_loading:
        force_eager: false
    swagger:
        api_keys:
            JWT:
                name: Authorization
                type: header

    use_symfony_listeners: true
    