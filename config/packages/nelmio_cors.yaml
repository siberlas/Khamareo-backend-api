nelmio_cors:
    defaults:
        origin_regex: true
        allow_origin: ['%env(CORS_ALLOW_ORIGIN)%']
        allow_methods: ['GET', 'OPTIONS', 'POST', 'PUT', 'PATCH', 'DELETE']
        allow_headers: ['Content-Type', 'Authorization', 'Accept', 'Accept-Language', 'Cache-Control', 'X-Requested-With']
        expose_headers: ['Link', 'Content-Disposition']
        allow_credentials: true
        max_age: 3600
    paths:
        '^/api':
            origin_regex: true
            allow_origin: ['%env(CORS_ALLOW_ORIGIN)%']
            allow_methods: ['GET', 'OPTIONS', 'POST', 'PUT', 'PATCH', 'DELETE']
            allow_headers: ['Content-Type', 'Authorization', 'Accept', 'Accept-Language', 'Cache-Control', 'X-Requested-With']
            allow_credentials: true
            max_age: 3600
        '^/waraba-l19':
            origin_regex: true
            allow_origin: ['%env(CORS_ALLOW_ORIGIN)%']
            allow_methods: ['GET', 'OPTIONS', 'POST']
            allow_headers: ['Content-Type', 'Authorization', 'Accept', 'Accept-Language', 'Cache-Control', 'X-Requested-With']
            allow_credentials: true
            max_age: 3600
