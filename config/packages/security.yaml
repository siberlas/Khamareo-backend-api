security:
    password_hashers:
        App\User\Entity\User:
            algorithm: auto

    providers:
        app_user_provider:
            entity:
                class: App\User\Entity\User
                property: email   # champ utilisé pour identifier l’utilisateur

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        # Firewall pour toutes les routes de l'API protégées
        
        # Point d'entrée login JWT (frontend)
        login:
            pattern: ^/api/auth
            stateless: true
            provider: app_user_provider
            json_login:
                check_path: /api/auth
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        # Point d'entrée login JWT (admin)
        admin_login:
            pattern: ^/waraba-l19/login
            stateless: true
            provider: app_user_provider
            json_login:
                check_path: /waraba-l19/login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
                

        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            entry_point: jwt
            jwt: ~
            refresh_jwt:
                check_path: /api/token/refresh
            lazy: true
       
    access_control:

        # Healthcheck (public – Docker / monitoring)
        - { path: ^/api/health$, roles: PUBLIC_ACCESS }

         # Stripe – statut de paiement (public)
        - { path: ^/api/stripe/payment-status, roles: PUBLIC_ACCESS }

        # Stripe – webhook (déjà OK mais on sécurise)
        - { path: ^/api/payment/webhook/stripe, roles: PUBLIC_ACCESS }

        # ✅ Routes publiques (authentification)
        - { path: ^/api/auth$, roles: PUBLIC_ACCESS }
        - { path: ^/api/users$, roles: PUBLIC_ACCESS, methods: [POST] }  # Inscription
        - { path: ^/api/confirm, roles: PUBLIC_ACCESS }  # Confirmation email
        - { path: ^/api/resend-confirmation, roles: PUBLIC_ACCESS }  # Renvoi confirmation email
        - { path: ^/api/newsletter/confirm, roles: PUBLIC_ACCESS }  # Confirmation newsletter
        - { path: ^/api/newsletter/resend-confirm, roles: PUBLIC_ACCESS }  # Renvoi confirmation newsletter
        - { path: ^/api/newsletter/unsubscribe, roles: PUBLIC_ACCESS }  # Désinscription newsletter
        - { path: ^/api/reset-password, roles: PUBLIC_ACCESS }  # Reset password
        - { path: ^/api/forgot-password, roles: PUBLIC_ACCESS }  # Demande reset
        
        # ✅ Routes publiques (catalogue)
        - { path: ^/api/categories, roles: PUBLIC_ACCESS }
        - { path: ^/api/products, roles: PUBLIC_ACCESS }
        - { path: ^/api/catalog, roles: PUBLIC_ACCESS }
        - { path: ^/api/reviews, roles: PUBLIC_ACCESS, methods: [GET, POST] }
        - { path: ^/api/hero_slides, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/shipping_methods, roles: PUBLIC_ACCESS }
        - { path: ^/api/shipping_rates, roles: PUBLIC_ACCESS }
        - { path: ^/api/shipping/options, roles: PUBLIC_ACCESS }
        - { path: ^/api/menu, roles: PUBLIC_ACCESS }
        - { path: ^/api/public, roles: PUBLIC_ACCESS }
        - { path: ^/api/token/refresh, roles: PUBLIC_ACCESS }
        - { path: ^/api/status, roles: PUBLIC_ACCESS }

        # ============================================================
        # PANIER INVITÉ (PUBLIC) ✅ AJOUTÉ
        # ============================================================
        - { path: ^/api/cart$, roles: PUBLIC_ACCESS }  # ✅ Route principale du panier
        - { path: ^/api/carts, roles: PUBLIC_ACCESS }
        - { path: ^/api/cart_items, roles: PUBLIC_ACCESS }
        - { path: ^/api/guest, roles: PUBLIC_ACCESS }  # ✅ CRITICAL - Routes guest

      
        
        # ✅ Routes publiques (checkout invité)
        - { path: ^/api/checkout, roles: PUBLIC_ACCESS }
        - { path: ^/api/cart/checkout, roles: PUBLIC_ACCESS }  # ✅ AJOUTER CETTE LIGNE
        - { path: ^/api/payment, roles: PUBLIC_ACCESS }
        - { path: ^/api/promo_codes/validate, roles: PUBLIC_ACCESS }
        - { path: ^/api/promo-codes/validate, roles: PUBLIC_ACCESS }
        - { path: ^/api/newsletter_subscribers, roles: PUBLIC_ACCESS }
        - { path: ^/api/cart/apply-promo, roles: PUBLIC_ACCESS }
        - { path: ^/api/cart/remove-promo, roles: PUBLIC_ACCESS }

        # ============================================================
        # ADRESSES (POST public pour checkout invité)
        # ============================================================
        - { path: ^/api/addresses$, roles: PUBLIC_ACCESS, methods: [POST] }

         # API root / API Platform entrypoint
        - { path: ^/api$, roles: PUBLIC_ACCESS }

        
        # ✅ API Platform (doc, contextes, etc.)
        - { path: ^/api/docs, roles: PUBLIC_ACCESS }
        - { path: ^/api/contexts, roles: PUBLIC_ACCESS }
        - { path: ^/api\.json, roles: PUBLIC_ACCESS }
        - { path: ^/api\.jsonld, roles: PUBLIC_ACCESS }

         # ============================================================
        # COMMANDES PUBLIQUES (invité / post-paiement)
        # ============================================================
        - { path: ^/api/orders/public, roles: PUBLIC_ACCESS }

        # ============================================================
        # COMMANDES (AUTHENTIFIÉ sauf création via checkout)
        # ============================================================
        - { path: ^/api/orders$, roles: PUBLIC_ACCESS, methods: [POST] }  # Création via checkout
        - { path: ^/api/orders, roles: IS_AUTHENTICATED_FULLY }  # Consultation

        # ============================================================
        # ADMIN
        # ============================================================
        - { path: ^/api/admin, roles: ROLE_ADMIN }

        - { path: ^/api/contact_messages, roles: PUBLIC_ACCESS, methods: [POST] }

        - { path: ^/api/stock_alerts, roles: ROLE_USER }

        - { path: ^/api/favorites, roles: ROLE_USER }

         # Routes Cloudinary - Admin uniquement
        - { path: ^/api/cloudinary, roles: ROLE_ADMIN }
        
        # Blog posts - Public en lecture, Admin en écriture (déjà configuré)
        - { path: ^/api/blog_posts, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/blog_posts, roles: ROLE_ADMIN, methods: [POST, PUT, PATCH, DELETE] }
        
        # Blog categories - Public en lecture, Admin en écriture
        - { path: ^/api/blog_categories, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/blog_categories, roles: ROLE_ADMIN, methods: [POST, PUT, PATCH, DELETE] }

        - { path: ^/api/test/media/stats, roles: PUBLIC_ACCESS }

        - { path: ^/api/media,  roles: ROLE_ADMIN, methods: [POST, PUT, PATCH, DELETE] } 

        - { path: ^/test-colissimo/orders,  roles: ROLE_ADMIN, methods: [POST, PUT, PATCH, DELETE] } 

        # ✅ Protéger tout le reste
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }
        
        