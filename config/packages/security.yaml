security:
    password_hashers:
        App\Entity\User:
            algorithm: auto

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email   # champ utilisé pour identifier l’utilisateur

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        # Firewall pour toutes les routes de l'API protégées
        
        # Point d'entrée login JWT
        login:
            pattern: ^/api/auth
            stateless: true
            provider: app_user_provider
            json_login:
                check_path: /api/auth
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
        
        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            jwt: ~

       
    access_control:
        # Autoriser l'accès public à /api/login
        - { path: ^/api/auth, roles: PUBLIC_ACCESS }
        - { path: ^/api/categories, roles: PUBLIC_ACCESS }
        - { path: ^/api/products, roles: PUBLIC_ACCESS }
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }
        # Protéger toutes les autres routes /api
