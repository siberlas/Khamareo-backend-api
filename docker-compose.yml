version: "3.9"

services:
  php:
    build: .docker/php
    container_name: khamareo-php
    volumes:
      - ./:/var/www/html
      - ./.docker/php/php.ini:/usr/local/etc/php/php.ini
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:1.25-alpine
    container_name: khamareo-nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  db:
    image: postgres:16-alpine
    container_name: khamareo-db
    environment:
      POSTGRES_DB: khamareo
      POSTGRES_USER: khamareo
      POSTGRES_PASSWORD: secret
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "54329:5432"
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: khamareo-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

  redis:
    image: redis:7-alpine
    container_name: khamareo-redis
    ports:
      - "6379:6379"

  ngrok:
    image: ngrok/ngrok:latest
    container_name: khamareo-ngrok
    command: http --domain=${NGROK_DOMAIN} nginx:80
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    depends_on:
      - nginx
    ports:
      - "4040:4040" # Dashboard ngrok local (http://localhost:4040)
  
  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Interface web
      
volumes:
  db_data:
