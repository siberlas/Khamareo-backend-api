server {
    listen 80;
    server_name api.khamareo.com;

    root /var/www/html/public;
    index index.php;

    # Security
    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Upload size (align with PHP post_max_size=25M)
    client_max_body_size 25M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        application/json
        application/ld+json
        application/javascript
        text/plain
        text/css
        text/xml
        application/xml;

    # Block dotfiles
    location ~ /\.(?!well-known) {
        deny all;
    }

    # Block sensitive files
    location ~* \.(env|pem|key|log)$ {
        deny all;
    }

    # Main location — Symfony routing
    location / {
        try_files $uri /index.php$is_args$args;
    }

    # PHP processing
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_buffer_size 32k;
        fastcgi_buffers 4 32k;
        fastcgi_read_timeout 30s;
        fastcgi_send_timeout 30s;

        # Forward real client IP from Cloudflare
        fastcgi_param REMOTE_ADDR $http_cf_connecting_ip;
        fastcgi_param HTTP_X_FORWARDED_FOR $http_cf_connecting_ip;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
    }

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;
}
